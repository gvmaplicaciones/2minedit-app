<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#141414"/>
  <!-- Orange bottom bar accent -->
  <rect x="10" y="50" width="44" height="3.5" rx="1.75" fill="#e87040"/>
  <!-- 2me text: "2" in orange, "me" in white -->
  <text y="45"
    font-family="Arial Black, Arial, system-ui, sans-serif"
    font-size="27"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-1">
    <tspan x="32" fill="#e87040">2</tspan><tspan fill="#ffffff">me</tspan>
  </text>
</svg>
